name: build-libcore
on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Clone sing-box-for-android
        run: git clone --depth 1 https://github.com/SagerNet/sing-box-for-android

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build libcore
        working-directory: sing-box-for-android/libcore
        run: |
          gomobile init
          make

      - uses: actions/upload-artifact@v4
        with:
          name: libcore-aar
          path: sing-box-for-android/libcore/libcore.aar
