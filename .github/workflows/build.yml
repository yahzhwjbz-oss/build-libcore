name: build-libcore
on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r28
          add-to-path: false

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Clone sing-box-for-android
        run: git clone --depth 1 https://github.com/SagerNet/sing-box-for-android sfa

      - name: Show structure
        run: |
          ls -la sfa
          cat sfa/libbox/build.gradle.kts 2>/dev/null || echo "no libbox/build.gradle"
          find sfa -maxdepth 3 -type d

      - name: Build libbox aar
        working-directory: sfa
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          gomobile init
          ./gradlew :libbox:assembleRelease --no-daemon --stacktrace || \
          ./gradlew :libcore:assembleRelease --no-daemon --stacktrace || \
          ./gradlew assembleRelease --no-daemon --stacktrace
          find . -name "*.aar"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: libcore-aar
          path: |
            sfa/**/*.aar
            sfa/**/outputs/**/*
